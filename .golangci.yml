version: "2"

run:
  timeout: 5m
  go: "1.26"

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - govet
    - misspell
    - unconvert
    - unparam
    - gosec

linters-settings:
  errcheck:
    check-type-assertions: true
  govet:
    enable-all: true
    disable:
      - fieldalignment
  gosec:
    excludes:
      - G104
  goimports:
    local-prefixes: lintree
  misspell:
    locale: US

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - unparam
        - gosec

  max-issues-per-linter: 0
  max-same-issues: 0
